[package]
name = "refined-tfhe-lhe"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
tfhe = { version = "=0.5.4", features = ["boolean", "shortint", "x86_64-unix"] }
rand = { version = "=0.8.5" }
aligned-vec = { version = "=0.5.0" }
dyn-stack = { version = "=0.9.1" }
aes = { version = "=0.8.4" }
rayon = { version = "=1.11.0", optional = true }
pulp = "=0.18.8"
lazy_static = "=1.5.0"

[dev-dependencies]
criterion = { version = "0.4", features = ["html_reports"] }
concrete-fft = { version = "0.4.0", features = ["serde"] }

[[bench]]
name = "bench_bitwise_cbs"
harness = false

[[bench]]
name = "bench_integer_input_lhe"
harness = false

[[bench]]
name = "bench_aes"
harness = false

[[bench]]
name = "bench_aes_half_cbs"
harness = false

[[bench]]
name = "bench_aes_others"
harness = false

[[bench]]
name = "bench_cmux"
harness = false

[[bench]]
name = "bench_tree"
harness = false

[[bench]]
name = "bench_lut_eval"
harness = false

[[bench]]
name = "salus"
harness = false

[features]
default = ["monothread", "tfhe/boolean", "tfhe/shortint", "tfhe/x86_64-unix"]
monothread = []
multithread = ["rayon"]
nightly-avx512 = ["tfhe/nightly-avx512"]
